<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>საპატრულო პოლიციის მართვის პანელი</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-color: #1a365d;
            --danger-color: #e53e3e;
            --success-color: #38a169;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .creator-card { border-top: 8px solid var(--primary-color); }
        .fine-card { border-top: 8px solid var(--danger-color); display: none; }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            text-transform: uppercase;
            font-size: 18px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #4a5568; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 15px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-pay { background-color: var(--danger-color); color: white; }
        .btn-pay:disabled { background-color: var(--success-color); cursor: not-allowed; }

        .alert-banner { background-color: #fff5f5; border: 1px solid #fed7d7; color: var(--danger-color); padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 20px; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.7; } }

        .evidence-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 6px; margin: 15px 0; border: 2px solid #cbd5e0; background-color: #eaeaea; }
        .price-tag { font-size: 26px; font-weight: bold; color: var(--danger-color); text-align: center; margin: 15px 0; }
        .timer { text-align: center; color: #718096; font-size: 14px; margin-bottom: 20px; font-weight: bold; }

        .signature-area { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #cbd5e0; padding-top: 15px; }
        .stamp { border: 3px double #0044ff; color: #0044ff; font-size: 11px; font-weight: bold; padding: 5px; border-radius: 50%; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; text-align: center; transform: rotate(-15deg); opacity: 0.8; }
        .signature { font-family: 'Courier New', Courier, monospace; font-style: italic; font-weight: bold; color: #2d3748; border-bottom: 1px solid #4a5568; padding-bottom: 5px; min-width: 120px; }

        .share-section { margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .share-buttons { display: flex; gap: 10px; width: 100%; }
        .btn-share { flex: 1; color: white; text-align: center; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: bold; }
        .whatsapp { background-color: #25D366; }
        .telegram { background-color: #0088cc; }

        .generated-output { display: none; margin-top: 15px; background: #f7fafc; padding: 15px; border-radius: 6px; border: 1px dashed var(--primary-color); }
        .link-box { background: white; padding: 8px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 12px; word-break: break-all; margin-bottom: 10px; color: #4a5568; max-height: 80px; overflow-y: auto; }

        .stats { font-size: 13px; color: #718096; text-align: center; margin-top: 10px; font-weight: bold; }

        .progress-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; flex-direction: column; color: white; z-index: 1000; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); width: 50px; height: 50px; border-radius: 50%; border-left-color: white; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card creator-card" id="creator-view">
    <h2>🚨 ახალი ჯარიმის გენერატორი 🚨</h2>
    
    <div class="form-group">
        <label>დამრღვევის სახელი და გვარი:</label>
        <input type="text" id="input-name" placeholder="მაგ: გიორგი პაპაშვილი">
    </div>

    <div class="form-group">
        <label>უფლებამოსილი ოფიცერი (შენი სახელი/გვარი):</label>
        <input type="text" id="input-officer" placeholder="მაგ: ლეიტენანტი ა. აბესაძე">
    </div>

    <div class="form-group">
        <label>რა დააშავა (დარღვევის აღწერა):</label>
        <input type="text" id="input-type" placeholder="მაგ: არასწორი პარკირება და მოძრაობის შეფერხება">
    </div>

    <div class="form-group">
        <label>ჯარიმის თანხა (მხოლოდ ციფრი ან ლარით):</label>
        <input type="text" id="input-price" placeholder="მაგ: 50 ლარი">
    </div>

    <div class="form-group">
        <label>ნივთმტკიცებულება (ატვირთე ფოტო გალერეიდან):</label>
        <input type="file" id="input-photo-file" accept="image/*">
    </div>

    <button class="btn btn-primary" onclick="generateFineLink()">ჯარიმის ბმულის შექმნა</button>

    <div class="generated-output" id="output-area">
        <label>გადაეცი ეს ლინკი დამრღვევს:</label>
        <div class="link-box" id="generated-link"></div>
        
        <div class="share-section">
            <div class="share-buttons">
                <a href="#" id="gen-ws" class="btn-share whatsapp" target="_blank">WhatsApp</a>
                <a href="#" id="gen-tg" class="btn-share telegram" target="_blank">Telegram</a>
            </div>
            <div id="creator-qrcode" style="margin-top:10px;"></div>
        </div>
    </div>
    
    <div class="stats" id="stats-display">სულ შექმნილია ჯარიმა: 0</div>
</div>


<div class="card fine-card" id="fine-view">
    <div class="alert-banner">🚨 სისტემური შეტყობინება: დაფიქსირებულია დარღვევა! 🚨</div>
    <h2 style="color: var(--danger-color)">ოფიციალური საჯარიმო ქვითარი</h2>

    <div style="background: #f7fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--danger-color)">
        <p style="margin: 5px 0;"><strong>მოქალაქე:</strong> <span id="view-name"></span></p>
        <p style="margin: 5px 0;"><strong>დარღვევა:</strong> <span id="view-type"></span></p>
        <p style="margin: 5px 0;"><strong>სტატუსი:</strong> <span id="view-status" style="color: var(--danger-color); font-weight: bold;">გადაუხდელი</span></p>
    </div>

    <label><strong>ფოტო-მტკიცებულება:</strong></label>
    <img id="view-photo" src="" alt="მტკიცებულება" class="evidence-img">

    <div class="price-tag" id="view-price">0 ლარი</div>
    <div class="timer" id="countdown">გადახდის ვადა: 24:00:00</div>

    <button class="btn btn-pay" id="pay-btn" onclick="processFakePayment()">ჯარიმის გადახდა</button>

    <div class="signature-area">
        <div>
            <span style="font-size: 11px; color: #718096;">უფლებამოსილი ოფიცერი:</span>
            <div class="signature" id="view-officer">ლეიტენანტი</div>
        </div>
        <div class="stamp">შსს<br>VALIDATED</div>
    </div>
</div>

<div class="progress-overlay" id="loading-overlay">
    <div class="spinner" id="spinner"></div>
    <h3 id="progress-text">მუშავდება...</h3>
</div>

<script>
    // სირენის ხმა
    function playSiren() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        let now = audioCtx.currentTime;
        osc.frequency.setValueAtTime(450, now);
        osc.frequency.linearRampToValueAtTime(850, now + 0.5);
        osc.frequency.linearRampToValueAtTime(450, now + 1.0);
        osc.frequency.linearRampToValueAtTime(850, now + 1.5);
        osc.frequency.linearRampToValueAtTime(450, now + 2.0);
        osc.start(now); gain.gain.setValueAtTime(0.15, now);
        osc.stop(now + 2.0);
    }

    // ფოტოს წაკითხვა გალერეიდან და კოდირება
    function generateFineLink() {
        const fileInput = document.getElementById('input-photo-file');
        
        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                buildFinalLink(base64Image);
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            // თუ ფოტო არ აირჩია, სტანდარტული ცარიელი პოლიციის ლოგო
            buildFinalLink("https://images.unsplash.com/photo-1557223562-6c77ef16210f");
        }
    }

    function buildFinalLink(photoData) {
        const name = encodeURIComponent(document.getElementById('input-name').value || "უცნობი მოქალაქე");
        const officer = encodeURIComponent(document.getElementById('input-officer').value || "ლეიტენანტი");
        const type = encodeURIComponent(document.getElementById('input-type').value || "დაუზუსტებელი დარღვევა");
        const price = encodeURIComponent(document.getElementById('input-price').value || "0 ლარი");
        
        const fineId = "fine_" + Math.floor(Math.random() * 100000);
        const baseUrl = window.location.href.split('?')[0];
        
        // ფოტოს ვინახავთ localStorage-ში ფაილის ID-ით, რომ ზუსტად იგივე ფოტო გამოჩნდეს!
        localStorage.setItem(fineId + '_img', photoData);

        const finalUrl = `${baseUrl}?id=${fineId}&name=${name}&officer=${officer}&type=${type}&price=${price}`;

        // შედეგის ჩვენება
        document.getElementById('generated-link').innerText = finalUrl;
        document.getElementById('output-area').style.display = 'block';

        // QR კოდი
        document.getElementById("creator-qrcode").innerHTML = "";
        new QRCode(document.getElementById("creator-qrcode"), { text: finalUrl, width: 120, height: 120 });

        // სოციალური ქსელები
        document.getElementById('gen-ws').href = `https://api.whatsapp.com/send?text=🚨 შენს სახელზე გამოწერილია ჯარიმა! ნახე: ${encodeURIComponent(finalUrl)}`;
        document.getElementById('gen-tg').href = `https://telegram.me/share/url?url=${encodeURIComponent(finalUrl)}&text=🚨 სასწრაფოდ ნახე ჯარიმა!`;

        // სტატისტიკა
        let count = parseInt(localStorage.getItem('totalFinesCreated') || '0');
        count++;
        localStorage.setItem('totalFinesCreated', count);
        updateStatsDisplay();
    }

    function updateStatsDisplay() {
        const count = localStorage.getItem('totalFinesCreated') || '0';
        document.getElementById('stats-display').innerText = `სულ შექმნილია ჯარიმა: ${count}`;
    }

    // 24 საათიანი ტაიმერი
    function startTimer() {
        let totalSeconds = 24 * 60 * 60;
        const timerEl = document.getElementById('countdown');
        setInterval(() => {
            if (totalSeconds <= 0) return;
            totalSeconds--;
            let hrs = Math.floor(totalSeconds / 3600);
            let mins = Math.floor((totalSeconds % 3600) / 60);
            let secs = totalSeconds % 60;
            timerEl.innerText = `გადახდის ვადა: ${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }, 1000);
    }

    // ფეიქ გადახდა და იმეილი
    function processFakePayment() {
        const urlParams = new URLSearchParams(window.location.search);
        const fineId = urlParams.get('id');
        const name = decodeURIComponent(urlParams.get('name') || "");
        const type = decodeURIComponent(urlParams.get('type') || "");
        const price = decodeURIComponent(urlParams.get('price') || "");

        const overlay = document.getElementById('loading-overlay');
        const text = document.getElementById('progress-text');
        const spinner = document.getElementById('spinner');

        overlay.style.display = 'flex';
        text.innerText = "მუშავდება...";
        spinner.style.display = 'block';

        setTimeout(() => {
            spinner.style.display = 'none';
            text.innerText = "✅ წარმატებული!";
            
            setTimeout(() => {
                overlay.style.display = 'none';
                
                if(fineId) {
                    localStorage.setItem(fineId, 'paid');
                }
                
                setPageToPaid();

                const email = "alexandreabesadze172@gmail.com";
                const subject = encodeURIComponent(`ჯარიმის გადახდა - ${name}`);
                const body = encodeURIComponent(`მოქალაქე: ${name}\nდარღვევა: ${type}\nთანხა: ${price}\nსტატუსი: წარმატებით გადახილია!`);
                
                window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
            }, 1200);
        }, 2500);
    }

    function setPageToPaid() {
        const btn = document.getElementById('pay-btn');
        btn.innerText = "უკვე გადახდილია";
        btn.disabled = true;
        btn.style.backgroundColor = "var(--success-color)";
        
        const statusText = document.getElementById('view-status');
        statusText.innerText = "გადახდილია";
        statusText.style.color = "var(--success-color)";
    }

    // ჩატვირთვის ლოგიკა
    window.onload = function() {
        updateStatsDisplay();
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.has('name') && urlParams.has('id')) {
            document.getElementById('creator-view').style.display = 'none';
            document.getElementById('fine-view').style.display = 'block';

            const fineId = urlParams.get('id');
            document.getElementById('view-name').innerText = decodeURIComponent(urlParams.get('name'));
            document.getElementById('view-officer').innerText = decodeURIComponent(urlParams.get('officer') || "ლეიტენანტი");
            document.getElementById('view-type').innerText = decodeURIComponent(urlParams.get('type'));
            document.getElementById('view-price').innerText = decodeURIComponent(urlParams.get('price'));
            
            // ფოტოს აღდგენა localStorage-დან (ზუსტად ის ფოტო, რაც აიტვირთა)
            const storedImg = localStorage.getItem(fineId + '_img');
            if (storedImg) {
                document.getElementById('view-photo').src = storedImg;
            } else {
                document.getElementById('view-photo').src = "https://images.unsplash.com/photo-1557223562-6c77ef16210f";
            }

            startTimer();

            if (fineId && localStorage.getItem(fineId) === 'paid') {
                setPageToPaid();
            }

            document.body.addEventListener('click', () => {
                playSiren();
            }, { once: true });

        } else {
            document.getElementById('creator-view').style.display = 'block';
            document.getElementById('fine-view').style.display = 'none';
        }
    };
</script>

</body>
</html>
